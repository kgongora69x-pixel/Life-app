<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Life App</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1506784983877-45594efa4cbe') no-repeat center/cover;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  z-index: -1;
}

#inicio {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#dias button {
  display: block;
  width: 200px;
  margin: 5px;
  background: #3b82f6;
  color: white;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.container {
  padding: 15px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.hecho {
  background: rgba(34,197,94,0.4);
}

.time {
  font-size: 12px;
  color: #ddd;
}

.progress-bar {
  height: 10px;
  background: #333;
  border-radius: 20px;
}

.progress {
  height: 10px;
  background: #22c55e;
  width: 0%;
}

.hidden { display: none; }
</style>
</head>

<body>

<div id="inicio">
  <h1>📱 Mi Life App</h1>
  <button onclick="mostrarDias()">Entrar</button>

  <div id="dias" class="hidden">
    <h3>📅 Selecciona tu día</h3>
    <button onclick="cargarDia('lunes')">Lunes</button>
    <button onclick="cargarDia('martes')">Martes</button>
    <button onclick="cargarDia('miercoles')">Miércoles</button>
    <button onclick="cargarDia('jueves')">Jueves</button>
    <button onclick="cargarDia('viernes')">Viernes</button>
    <button onclick="cargarDia('sabado')">Sábado</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="container">
    <h2 id="titulo"></h2>

    <div class="progress-bar">
      <div class="progress" id="barra"></div>
    </div>

    <div id="rutina"></div>

    <button onclick="volver()">⬅ Volver</button>
  </div>
</div>

<script>

let diaActual = "";

function mostrarDias(){
  document.getElementById("dias").classList.remove("hidden");
}

function volver(){
  document.getElementById("app").style.display = "none";
  document.getElementById("inicio").style.display = "flex";
}

function rutina(dia){
  let r = [
  ["06:00","🧹 Barrer casa"],
  ["06:30","🏠 Tareas domésticas"],
  ["06:45","🚿 Ducha"],
  ["07:00","🍳 Desayuno"]
  ];

  if(dia == "lunes" || dia == "miercoles" || dia == "viernes"){
    r.push(["08:00","📘 Botánica"]);
    r.push(["10:00","🧪 Química"]);
  } else {
    r.push(["08:00","⚡ Física"]);
    r.push(["10:00","📐 Matemática"]);
  }

  if(dia == "jueves"){
    r.push(["14:00 - 15:00","🍽 Almuerzo"]);
  } else {
    r.push(["14:00","🍽 Almuerzo"]);
  }

  if(["lunes","jueves","sabado"].includes(dia)){
    r.push(["15:00 - 18:00","⚽ Deporte"]);
  } else {
    r.push(["15:00 - 19:00","💼 Trabajo"]);
  }

  r.push(["19:00 - 20:00","🛀 Cena / descanso"]);

  if(["lunes","miercoles","viernes"].includes(dia)){
    r.push(["20:00 - 21:00","📘 Botánica (fuerte)"]);
    r.push(["21:00 - 21:15","☕ Descanso"]);
    r.push(["21:15 - 22:00","🧪 Química (ligero)"]);
  } else {
    r.push(["20:00 - 21:00","⚡ Física (fuerte)"]);
    r.push(["21:00 - 21:15","☕ Descanso"]);
    r.push(["21:15 - 22:00","📐 Matemática (ligero)"]);
  }

  return r;
}

function cargarDia(dia){
  diaActual = dia;

  document.getElementById("inicio").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("titulo").innerText = "📅 " + dia.toUpperCase();

  setTimeout(cargar, 100);
}

function cargar(){
  let cont = document.getElementById("rutina");
  cont.innerHTML = "";

  let datos = rutina(diaActual);
  let comp = 0;

  datos.forEach((e,i)=>{
    let key = diaActual+i;
    let ok = localStorage.getItem(key);

    if(ok) comp++;

    let div = document.createElement("div");
    div.className = "card " + (ok ? "hecho" : "");

    div.innerHTML = `
      <div class="time">${e[0]}</div>
      <div>${e[1]}</div>
      <button>${ok ? "❌ Quitar" : "✔ Completar"}</button>
    `;

    div.querySelector("button").onclick = () => toggle(key);

    cont.appendChild(div);
  });

  document.getElementById("barra").style.width = (comp/datos.length*100)+"%";
}

function toggle(k){
  if(localStorage.getItem(k)){
    localStorage.removeItem(k);
  } else {
    localStorage.setItem(k,true);
  }
  cargar();
}

</script>

</body>
</html>
