<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Life App PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
}

/* PANTALLA INICIO */
#inicio {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#inicio h1 {
  font-size: 30px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* DIAS */
#dias button {
  background: #3b82f6;
  color: white;
}

/* APP */
.hidden { display: none; }

.container {
  padding: 15px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.hecho {
  background: rgba(34,197,94,0.4);
}

.time {
  font-size: 12px;
  color: #94a3b8;
}

.progress-bar {
  height: 10px;
  background: #334155;
  border-radius: 10px;
}

.progress {
  height: 10px;
  background: #22c55e;
  width: 0%;
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <h1>📱 Mi Life App</h1>
  <button onclick="mostrarDias()">Entrar</button>

  <div id="dias" class="hidden">
    <h3>Selecciona tu día</h3>
    <button onclick="cargarDia('lunes')">Lunes</button>
    <button onclick="cargarDia('martes')">Martes</button>
    <button onclick="cargarDia('miercoles')">Miércoles</button>
    <button onclick="cargarDia('jueves')">Jueves</button>
    <button onclick="cargarDia('viernes')">Viernes</button>
    <button onclick="cargarDia('sabado')">Sábado</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="container">
    <h2 id="titulo"></h2>

    <div class="progress-bar">
      <div class="progress" id="barra"></div>
    </div>

    <div id="rutina"></div>
  </div>
</div>

<script>

let diaActual = "";

function mostrarDias(){
  document.getElementById("dias").classList.remove("hidden");
}

function cursos(dia){
  const map = {
    lunes:["Botánica","Química"],
    martes:["Física","Matemática"],
    miercoles:["Botánica","Química"],
    jueves:["Física","Matemática"],
    viernes:["Botánica","Química"],
    sabado:["Física","Matemática"]
  };
  return map[dia];
}

function rutina(dia){
  let r = [
  ["06:00","🧹 Barrer"],
  ["06:30","📋 Tareas"],
  ["06:45","🚿 Ducha"],
  ["07:00","🍳 Desayuno"],
  ["07:15","🚌 Traslado"]
  ];

  if(["lunes","jueves","sabado"].includes(dia)){
    r.push(["14:00","⚽ Deporte"]);
  } else {
    r.push(["14:00","💼 Trabajo"]);
  }

  let c = cursos(dia);

  r.push(["20:00","📘 "+c[0]]);
  r.push(["21:15","☕ Descanso"]);
  r.push(["21:20","📗 "+c[1]]);

  return r;
}

function cargarDia(dia){
  diaActual = dia;

  document.getElementById("inicio").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("titulo").innerText = dia.toUpperCase();

  cargar();
}

function cargar(){
  let cont = document.getElementById("rutina");
  cont.innerHTML = "";

  let datos = rutina(diaActual);
  let comp = 0;

  datos.forEach((e,i)=>{
    let key = diaActual+i;
    let ok = localStorage.getItem(key);

    if(ok) comp++;

    cont.innerHTML += `
    <div class="card ${ok?'hecho':''}">
      <div class="time">${e[0]}</div>
      <div>${e[1]}</div>
      <button onclick="toggle('${key}')">
        ${ok ? "❌ Quitar" : "✔ Completar"}
      </button>
    </div>`;
  });

  document.getElementById("barra").style.width = (comp/datos.length*100)+"%";
}

function toggle(k){
  if(localStorage.getItem(k)){
    localStorage.removeItem(k);
  } else {
    localStorage.setItem(k,true);
  }
  cargar();
}

</script>

</body>
</html>
