<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Life App PRO</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1506784983877-45594efa4cbe') no-repeat center/cover;
  color: white;
}

/* CAPA OSCURA */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  z-index: -1;
}

/* INICIO */
#inicio {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  animation: fade 1s;
}

#inicio h1 {
  font-size: 35px;
}

#inicio button {
  background: #22c55e;
  color: white;
  font-size: 16px;
}

/* DIAS */
#dias button {
  display: block;
  width: 200px;
  margin: 5px;
  background: #3b82f6;
  color: white;
}

/* APP */
.container {
  padding: 15px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  animation: fadeUp 0.4s;
}

.hecho {
  background: rgba(34,197,94,0.4);
}

.time {
  font-size: 13px;
  color: #ddd;
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  margin-top: 8px;
  cursor: pointer;
}

.progress-bar {
  height: 10px;
  background: #333;
  border-radius: 20px;
}

.progress {
  height: 10px;
  background: linear-gradient(90deg,#22c55e,#4ade80);
  width: 0%;
}

/* ANIMACIONES */
@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes fadeUp {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.hidden { display: none; }

</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <h1>📱 Mi Life App</h1>
  <button onclick="mostrarDias()">Entrar</button>

  <div id="dias" class="hidden">
    <h3>📅 Elige tu día</h3>
    <button onclick="cargarDia('lunes')">🌿 Lunes</button>
    <button onclick="cargarDia('martes')">⚡ Martes</button>
    <button onclick="cargarDia('miercoles')">📘 Miércoles</button>
    <button onclick="cargarDia('jueves')">🔥 Jueves</button>
    <button onclick="cargarDia('viernes')">🎯 Viernes</button>
    <button onclick="cargarDia('sabado')">⚽ Sábado</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="container">
    <h2 id="titulo"></h2>

    <div class="progress-bar">
      <div class="progress" id="barra"></div>
    </div>

    <div id="rutina"></div>

    <button onclick="volver()">⬅ Volver</button>
  </div>
</div>

<script>

let diaActual = "";

function mostrarDias(){
  document.getElementById("dias").classList.remove("hidden");
}

function volver(){
  document.getElementById("app").style.display = "none";
  document.getElementById("inicio").style.display = "flex";
}

function cursos(dia){
  const map = {
    lunes:["🌿 Botánica","🧪 Química"],
    martes:["⚡ Física","📐 Matemática"],
    miercoles:["🌿 Botánica","🧪 Química"],
    jueves:["⚡ Física","📐 Matemática"],
    viernes:["🌿 Botánica","🧪 Química"],
    sabado:["⚡ Física","📐 Matemática"]
  };
  return map[dia];
}

function rutina(dia){
  let r = [
  ["06:00","🧹 Barrer casa"],
  ["06:30","📋 Tareas"],
  ["06:45","🚿 Ducha"],
  ["07:00","🍳 Desayuno"],
  ["07:15","🚌 Traslado"]
  ];

  if(["lunes","jueves","sabado"].includes(dia)){
    r.push(["14:00","⚽ Deporte"]);
  } else {
    r.push(["14:00","💼 Trabajo"]);
  }

  let c = cursos(dia);

  r.push(["20:00","📘 "+c[0]]);
  r.push(["21:15","☕ Descanso"]);
  r.push(["21:20","📗 "+c[1]]);

  return r;
}

function cargarDia(dia){
  diaActual = dia;

  document.getElementById("inicio").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("titulo").innerText = "📅 " + dia.toUpperCase();

  setTimeout(cargar, 100);
}

function cargar(){
  let cont = document.getElementById("rutina");
  cont.innerHTML = "";

  let datos = rutina(diaActual);
  let comp = 0;

  datos.forEach((e,i)=>{
    let key = diaActual+i;
    let ok = localStorage.getItem(key);

    if(ok) comp++;

    let div = document.createElement("div");
    div.className = "card " + (ok ? "hecho" : "");

    div.innerHTML = `
      <div class="time">${e[0]}</div>
      <div>${e[1]}</div>
      <button>${ok ? "❌ Quitar" : "✔ Completar"}</button>
    `;

    div.querySelector("button").onclick = () => toggle(key);

    cont.appendChild(div);
  });

  document.getElementById("barra").style.width = (comp/datos.length*100)+"%";
}

function toggle(k){
  if(localStorage.getItem(k)){
    localStorage.removeItem(k);
  } else {
    localStorage.setItem(k,true);
  }
  cargar();
}

</script>

</body>
</html>
